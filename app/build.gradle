plugins {
    id 'com.android.application'
}

android {
    signingConfigs {
        release {
            def sp = System.getenv('SIGNING_KEY_PATH')
            storeFile sp ? file(sp) : null
            storePassword System.getenv('SIGNING_STORE_PASS') ?: ''
            keyAlias System.getenv('SIGNING_ALIAS') ?: ''
            keyPassword System.getenv('SIGNING_KEY_PASS') ?: ''
        }
    }

    namespace 'com.meme.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.meme.app"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.squareup.retrofit2:retrofit:2.11.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.11.0'
    implementation 'androidx.room:room-runtime:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'
    implementation 'androidx.navigation:navigation-fragment:2.7.7'
    implementation 'androidx.navigation:navigation-ui:2.7.7'
}
